run_name: "fno_hw2d_temporal_split"

pde: "hw2d"

paths:
  output_base: "/scratch/10407/anthony50102/fno_output/"
  
  data_dir: "/work/10407/anthony50102/vista/"
  
  # Single trajectory for temporal split mode
  training_files: 
    - "test_nu5e-9.h5"

  # test_files not used in temporal_split mode (we use later part of training file)
  test_files: []

physics:
  dt: 0.025
  n_fields: 2
  n_x: 512
  n_y: 512

# Training mode configuration — matches DMD/OpInf splits
training_mode: "temporal_split"
train_start: 8000      # Train from snapshot 8000
train_end: 16000       # Train to snapshot 16000 (8000 snapshots)
test_start: 16000      # Test from snapshot 16000
test_end: 20000        # Test to snapshot 20000 (4000 snapshots)

# FNO model configuration — scaled up for 2D turbulence
model:
  n_modes: [64, 64]     # Fourier modes in each dimension
  in_channels: 2        # density + potential
  out_channels: 2       # predict next density + potential
  hidden_channels: 256  # Width of the network (doubled from 128)
  n_layers: 5           # Number of Fourier layers (matching KS)

# Training configuration — KS-style training loop
training:
  batch_size: 6         # Balanced: better gradients + fits in 97GB GPU
  n_epochs: 200         # Max epochs (early stopping will cut this short)
  learning_rate: 5.0e-4 # Lower LR for stability (matching KS)
  weight_decay: 1.0e-4  # L2 regularization
  grad_clip: 1.0
  noise_std: 0.02       # Higher noise for robustness (matching KS)
  gradient_checkpointing: true
  
  # Validation split from training data (NOT test data) for early stopping
  val_fraction: 0.2     # Last 20% of training window → [14400, 16000)
  early_stopping_patience: 10  # Stop after 10 eval cycles with no improvement
  
  # Learning rate scheduler
  scheduler:
    type: "cosine"
    warmup_epochs: 5
  
  # Checkpointing
  save_every: 20
  eval_every: 5         # Evaluate more often for early stopping

# Step 2: Curriculum — KS-style with 6 stages for longer rollout training
curriculum:
  - [5,  0.8, 20]   # Stage 1: Short rollouts, 80% teacher forcing
  - [10, 0.6, 20]   # Stage 2: Medium rollouts, 60% teacher forcing
  - [20, 0.4, 20]   # Stage 3: Longer rollouts, 40% teacher forcing
  - [40, 0.2, 20]   # Stage 4: Long rollouts, 20% teacher forcing
  - [60, 0.1, 20]   # Stage 5: Very long rollouts, 10% teacher forcing
  - [80, 0.0, 50]   # Stage 6: Full autoregressive (extended)

# Logging
log_level: "INFO"
