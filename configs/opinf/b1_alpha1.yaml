run_name: "b1_alpha1_smoke"

# B1 single-α OpInf smoke test on Frontera dev queue.
# Goal: confirm preprocessing + POD + operator inference pipeline runs
# end-to-end on the new HW DNS files at α=1.0. Small rank, modest
# regularizer grid -- sizing/tuning happens *after* this works.

paths:
  output_base: "/scratch2/10407/anthony50102/IEEE/output/"
  data_dir: "/work2/10407/anthony50102/frontera/data/IEEE/hw2d/alpha1.0_n512/"
  training_files:
    - trajectory.h5
  test_files: []

physics:
  # frame_dt from data_card.yaml: density/phi are saved every 0.25 t.u.
  # That is the snapshot dt OpInf sees; the underlying simulator dt is 0.025.
  dt: 0.25
  n_fields: 2
  n_x: 512
  n_y: 512

# 2001 frames total. data_card.yaml burn_in_frames=1000, so post-burn-in
# usable range is [1000, 2001). Hold out the last ~300 for test.
training_mode:
  mode: "temporal_split"
  train_start: 1000
  train_end: 1700
  test_start: 1700
  test_end: 2001

reduction:
  method: "linear"
  r: 20
  target_energy: 0.99

truncation:
  enabled: false

preprocessing:
  centering: true
  scaling: false

training:
  training_end: 700
  n_steps: 1001

# Closure off for the smoke; turn on once the basic pipeline is verified.
closure:
  enabled: false

# Tiny grid -- 4 x 4 x 4 x 4 = 256 combos. Wide log range so something lands
# in a sensible regime; tighten once we see optimum location.
regularization:
  state_lin:
    min: 1.0e-2
    max: 1.0e6
    num: 4
    scale: "log"
  state_quad:
    min: 1.0e2
    max: 1.0e14
    num: 4
    scale: "log"
  output_lin:
    min: 1.0e-6
    max: 1.0e2
    num: 4
    scale: "log"
  output_quad:
    min: 1.0e-6
    max: 1.0e2
    num: 4
    scale: "log"

model_selection:
  threshold_mean: 0.20
  threshold_std: 1.0
  max_models: 100

evaluation:
  save_predictions: true
  generate_plots: true

execution:
  verbose: true
  log_level: "INFO"
  engine: "h5netcdf"
