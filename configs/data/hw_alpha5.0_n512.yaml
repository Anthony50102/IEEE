# HW DNS config: alpha = 5.0 (strongly adiabatic / quasi-Hasegawa-Mima).
# Reference Gamma_n = 0.13 +/- 0.02 (hw2d README, 512^2).
# Stored at full 512^2 resolution; downstream training may stride to 256^2.
#
# Long end_time required: hw2d table reports `age 800+` for steady stats here.

alpha: 5.0
kappa: 1.0
k0: 0.15
N: 3
nu: 5.0e-9

grid_pts: 512
downsample_factor: 1
step_size: 0.01
end_time: 1000.0
snaps: 25                    # dt_save = 0.25  -> ~4000 frames

init_type: normal
init_scale: 0.01
seed: 0

recording_start_time: 0.0
buffer_length: 100
chunk_size: 100

label: hw_alpha5.0_n512
