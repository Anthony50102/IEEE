run_name: "opinf_ks_temporal_split"  # OpInf on Kuramoto-Sivashinsky, temporal split

pde: "ks"

paths:
  output_base: "/Users/anthonypoole/Repositories/ieee_paper/IEEE/local_output/"
  
  data_dir: "/Users/anthonypoole/Repositories/ieee_paper/IEEE/data/ks"
  
  # Single trajectory for temporal split mode
  training_files: 
      - ks_sim_step0.1_L100_N200_steps2000_20260223093716_4479.h5

  # test_files not used in temporal_split mode
  test_files: []

physics:
  dt: 0.1
  n_fields: 1
  n_x: 200
  n_y: 1
  L: 100.0
  N: 200

# Training mode configuration
training_mode:
  mode: "temporal_split"
  train_start: 1250         # Train from snapshot 0
  train_end: 1800         # Train to snapshot 500  
  test_start: 1800        # Test from snapshot 500
  test_end: 2000         # Test to snapshot 1000

reduction:
  method: "linear"                 # "linear" (POD) or "manifold"
  r: 50
  target_energy: 0.99

truncation:
  enabled: false

preprocessing:
  centering: true
  scaling: false

training:
  training_end: 550
  n_steps: 550

regularization:
  state_lin:
    min: 1.0e-1
    max: 1.0e6
    num: 10
    scale: "log"
  state_quad:
    min: 1.0e1
    max: 1.0e10
    num: 10
    scale: "log"
  output_lin:
    min: 1.0e-4
    max: 1.0e2
    num: 10
    scale: "log"
  output_quad:
    min: 1.0e-2
    max: 1.0e4
    num: 10
    scale: "log"

model_selection:
  method: "threshold"
  threshold_mean: 0.5
  threshold_std: 0.50

evaluation:
  save_predictions: true
  generate_plots: true
  plot_state_error: true
  plot_state_snapshots: true
  n_snapshot_samples: 5
  qoi_method: "physics"

execution:
  verbose: true
  log_level: "INFO"
  engine: "h5netcdf"
