run_name: "opinf_ks_r15_physics_select"

pde: "ks"

paths:
  output_base: "./local_output/"
  data_dir: "./data/ks"
  training_files: 
      - ks_sim_step0.1_L100_N200_steps2000_20260223093716_4479.h5
  test_files: []

physics:
  dt: 0.1
  n_fields: 1
  n_x: 200
  n_y: 1
  L: 100.0
  N: 200

training_mode:
  mode: "temporal_split"
  train_start: 1250
  train_end: 1800
  test_start: 1800
  test_end: 2000

reduction:
  method: "linear"
  r: 15
  target_energy: 0.9999

truncation:
  enabled: false

preprocessing:
  centering: true
  scaling: false

training:
  training_end: 550
  n_steps: 550

# =============================================================================
# r=15: MUCH MORE OVERDETERMINED (549 rows x 135 cols, 4.1x ratio)
# Physics-based energy selection, mean-only thresholds
# =============================================================================

regularization:
  state_lin:
    min: 1.0e-3
    max: 1.0e3
    num: 12
    scale: "log"

  state_quad:
    min: 1.0e1
    max: 1.0e12
    num: 15
    scale: "log"

  output_lin:
    min: 1.0e-1
    max: 1.0e-1
    num: 1
    scale: "log"

  output_quad:
    min: 1.0e1
    max: 1.0e1
    num: 1
    scale: "log"

model_selection:
  method: "threshold"
  threshold_mean: 0.05
  threshold_std: 100.0
  threshold_mean_c: 100.0
  threshold_std_c: 100.0

evaluation:
  save_predictions: true
  generate_plots: true
  plot_state_error: true
  plot_state_snapshots: true
  n_snapshot_samples: 5
  qoi_method: "physics"
  sweep_qoi_method: "physics_energy"

execution:
  verbose: true
  log_level: "INFO"
  engine: "h5netcdf"
