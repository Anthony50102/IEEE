run_name: "opinf_ks_baseline_r13"

pde: "ks"

paths:
  output_base: "./local_output/"
  data_dir: "./data/ks"
  training_files: 
      - ks_sim_step0.1_L100_N200_steps4000.h5
  test_files: []

physics:
  dt: 0.1
  n_fields: 1
  n_x: 200
  n_y: 1
  L: 100.0
  N: 200

training_mode:
  mode: "temporal_split"
  train_start: 2000
  train_end: 3500
  test_start: 3500
  test_end: 4000

reduction:
  method: "linear"
  r: 13
  target_energy: 0.9999

preprocessing:
  centering: true
  scaling: false

training:
  training_end: 500
  n_steps: 500

stability_projection:
  enabled: false

regularization:
  state_lin:
    min: 1.0e-4
    max: 1.0e4
    num: 8
    scale: "log"

  state_quad:
    min: 1.0e1
    max: 1.0e8
    num: 10
    scale: "log"

  output_lin:
    min: 1.0e-1
    max: 1.0e-1
    num: 1
    scale: "log"

  output_quad:
    min: 1.0e1
    max: 1.0e1
    num: 1
    scale: "log"

model_selection:
  method: "threshold"
  threshold_mean: 1.0
  threshold_std: 100.0
  threshold_mean_c: 100.0
  threshold_std_c: 100.0
  max_models: 1

evaluation:
  save_predictions: true
  generate_plots: true
  plot_state_error: true
  plot_state_snapshots: true
  n_snapshot_samples: 5
  qoi_method: "physics"
  sweep_qoi_method: "physics_energy"

execution:
  verbose: true
  log_level: "INFO"
  engine: "h5netcdf"
