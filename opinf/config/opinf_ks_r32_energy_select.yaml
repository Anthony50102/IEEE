run_name: "opinf_ks_r32_energy_select"

pde: "ks"

paths:
  output_base: "./local_output/"
  data_dir: "./data/ks"
  training_files: 
      - ks_sim_step0.1_L100_N200_steps2000_20260223093716_4479.h5
  test_files: []

physics:
  dt: 0.1
  n_fields: 1
  n_x: 200
  n_y: 1
  L: 100.0
  N: 200

training_mode:
  mode: "temporal_split"
  train_start: 1250
  train_end: 1800
  test_start: 1800
  test_end: 2000

reduction:
  method: "linear"
  r: 50
  target_energy: 0.99

truncation:
  enabled: false

preprocessing:
  centering: true
  scaling: false

training:
  training_end: 550
  n_steps: 550

# =============================================================================
# r=32 (99% energy) WITH ENERGY-ONLY SELECTION
# =============================================================================
# SVD diagnosis at r=32:
#   Linear:    cond=54,    σ_min²=2.43,  σ_max²=7.16e3
#   Quadratic: cond=1.4e5, σ_min²≈0,     σ_max²=2.0e5
#
# Wide regularization range: include lower values so quadratic term
# stays active (prevents dissipative decay seen at r=15).
# =============================================================================

regularization:
  state_lin:
    min: 1.0e-1
    max: 1.0e5
    num: 10
    scale: "log"

  # Include lower regularization to keep quadratic active
  state_quad:
    min: 1.0e1
    max: 1.0e8
    num: 10
    scale: "log"

  output_lin:
    min: 1.0e-4
    max: 1.0e2
    num: 10
    scale: "log"

  output_quad:
    min: 1.0e-2
    max: 1.0e4
    num: 10
    scale: "log"

model_selection:
  method: "threshold"
  threshold_mean: 0.05
  threshold_std: 0.30
  # Disable enstrophy filtering — not meaningful for low-rank KS
  threshold_mean_c: 100.0
  threshold_std_c: 100.0

evaluation:
  save_predictions: true
  generate_plots: true
  plot_state_error: true
  plot_state_snapshots: true
  n_snapshot_samples: 5
  qoi_method: "physics"

execution:
  verbose: true
  log_level: "INFO"
  engine: "h5netcdf"
