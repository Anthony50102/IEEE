run_name: "opinf_ks_r15_tighter"

pde: "ks"

paths:
  output_base: "./local_output/"
  data_dir: "./data/ks"
  training_files: 
      - ks_sim_step0.1_L100_N200_steps2000_20260223093716_4479.h5
  test_files: []

physics:
  dt: 0.1
  n_fields: 1
  n_x: 200
  n_y: 1
  L: 100.0
  N: 200

training_mode:
  mode: "temporal_split"
  train_start: 1250
  train_end: 1800
  test_start: 1800
  test_end: 2000

reduction:
  method: "linear"
  r: 15
  target_energy: 0.9999

truncation:
  enabled: false

preprocessing:
  centering: true
  scaling: false

training:
  training_end: 550
  n_steps: 550

# =============================================================================
# ORIGINAL REG RANGES (known to produce passing models) + TIGHTER THRESHOLDS
# =============================================================================
# The "SVD-informed" heavy over-regularization approach doesn't work for KS
# because it kills the quadratic term. The original ranges allow the quadratic
# term to be active, which is needed to capture chaotic dynamics.
#
# Key test: do tighter thresholds (paper-inspired) improve test-set results
# when using the same reg ranges that previously produced models?
# =============================================================================

regularization:
  state_lin:
    min: 1.0e-1
    max: 1.0e6
    num: 10
    scale: "log"

  state_quad:
    min: 1.0e1
    max: 1.0e10
    num: 10
    scale: "log"

  output_lin:
    min: 1.0e-4
    max: 1.0e2
    num: 10
    scale: "log"

  output_quad:
    min: 1.0e-2
    max: 1.0e4
    num: 10
    scale: "log"

# Paper-inspired tighter thresholds (5% mean, 30% std)
model_selection:
  method: "threshold"
  threshold_mean: 0.05
  threshold_std: 0.30

evaluation:
  save_predictions: true
  generate_plots: true
  plot_state_error: true
  plot_state_snapshots: true
  n_snapshot_samples: 5
  qoi_method: "physics"

execution:
  verbose: true
  log_level: "INFO"
  engine: "h5netcdf"
